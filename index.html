<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カラダ">
<title>カラダ管理</title>
<style>
  :root{
    --bg:#16181c; --card:#1f2329; --ink:#ffffff; --sub:#8a929c;
    --line:#2b2f36; --accent:#c6f24e; --accent2:#ff8a3d;
    --warn:#ff6b5a; --shadow:none;
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;
    padding-bottom:80px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;padding:0 14px}
  header{position:sticky;top:0;z-index:20;background:rgba(22,24,28,.92);backdrop-filter:blur(8px);
    padding:16px 14px 10px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:21px;margin:0;font-weight:800;letter-spacing:.01em}
  header h1 span{color:var(--accent)}
  .gear{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub);padding:4px}
  h2{font-size:16px;margin:18px 0 8px;font-weight:800}
  h3{font-size:13px;margin:14px 0 6px;color:var(--sub);font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:15px;margin-bottom:12px}
  .muted{color:var(--sub);font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  label{font-size:13px;color:var(--sub);display:block;margin:8px 0 3px}
  input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;
    font-size:16px;font-family:inherit;background:#22262c;color:var(--ink)}
  textarea{resize:vertical;min-height:52px}
  input[type=checkbox]{width:auto}
  .btn{background:var(--accent);color:#16181c;border:none;border-radius:12px;padding:14px;
    font-size:16px;font-weight:800;cursor:pointer;width:100%}
  .btn.sm{width:auto;padding:9px 13px;font-size:14px;border-radius:10px}
  .btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
  .btn.gray{background:#2b2f36;color:var(--ink)}
  .btn.warn{background:var(--warn);color:#16181c}
  .chip{display:inline-block;padding:8px 13px;border-radius:999px;border:1px solid var(--line);
    background:#22262c;font-size:14px;cursor:pointer;margin:0 6px 6px 0;color:var(--ink)}
  .chip.on{background:var(--accent);color:#16181c;border-color:var(--accent);font-weight:700}
  .chip.tag.on{background:var(--accent2);border-color:var(--accent2);color:#16181c}
  .subtabs{display:flex;gap:6px;margin:6px 0 10px}
  .subtabs button{flex:1;padding:11px;border:1px solid var(--line);background:#22262c;border-radius:10px;
    font-size:14px;font-weight:700;color:var(--sub);cursor:pointer}
  .subtabs button.on{background:var(--accent);color:#16181c;border-color:var(--accent)}
  .item{border-bottom:1px solid var(--line);padding:10px 0;font-size:14px}
  .item:last-child{border-bottom:none}
  .item .d{font-size:12px;color:var(--sub)}
  .flex2{display:flex;gap:8px}.flex2>*{flex:1}
  .flex3{display:flex;gap:6px}.flex3>*{flex:1}
  nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#131519;border-top:1px solid var(--line);
    display:flex;max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:10px 0 9px;font-size:10px;color:var(--sub);cursor:pointer;font-weight:600}
  nav button .ic{display:block;margin-bottom:3px}
  nav button.on{color:var(--accent)}
  .nic{width:24px;height:24px;margin:0 auto;display:block}
  .gearic{width:24px;height:24px;display:block}
  #sessbar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 56px);z-index:29;
    max-width:520px;margin:0 auto;background:#1b1e23;border-top:2px solid var(--accent);
    box-shadow:0 -6px 18px rgba(0,0,0,.35);padding:9px 14px;display:none}
  #sessbar.on{display:flex;align-items:center;gap:10px}
  body.hasbar{padding-bottom:132px}
  .kgin{width:100%;text-align:center;font-size:17px;font-weight:800;padding:11px 4px;height:auto}
  .cthumb{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:8px;display:block;background:#22262c}
  nav button{font-size:9.5px}
  .cbub{max-width:88%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.65;word-break:break-word}
  .cbub.user{align-self:flex-end;background:var(--accent);color:#16181c;font-weight:600;border-bottom-right-radius:4px}
  .cbub.assistant{align-self:flex-start;background:#22262c;border:1px solid var(--line);border-bottom-left-radius:4px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;background:#2b2f36;color:var(--sub);font-weight:700}
  .pill.hot{background:rgba(255,107,90,.18);color:#ff9b8f}
  .pill.ok{background:rgba(198,242,78,.16);color:var(--accent)}
  .del{color:var(--warn);font-size:12px;background:none;border:none;cursor:pointer;padding:4px 6px}
  .gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .gallery img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;cursor:pointer}
  .banner{background:#22262c;border:1px solid var(--line);color:var(--sub);font-size:12px;
    padding:10px 12px;border-radius:10px;margin-bottom:10px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;
    align-items:center;justify-content:center;padding:16px}
  .overlay.on{display:flex}
  .overlay img{max-width:100%;max-height:80vh;border-radius:10px}
  .sheet{position:fixed;inset:0;background:var(--bg);z-index:40;overflow-y:auto;display:none}
  .sheet.on{display:block}
  .close{background:none;border:none;font-size:22px;color:var(--sub);cursor:pointer}
  .kpi{display:flex;gap:8px}.kpi>div{flex:1;text-align:center;background:#22262c;border:1px solid var(--line);
    border-radius:10px;padding:10px 4px}
  .kpi b{font-size:20px;display:block;font-weight:800}.kpi span{font-size:11px;color:var(--sub)}
  svg{display:block;width:100%;height:auto}
  .hint{font-size:12px;color:var(--sub);margin-top:4px}
  .stp{display:flex;align-items:center;gap:5px}
  .stp button{min-width:42px;height:44px;padding:0 4px;border:1px solid var(--line);background:#22262c;border-radius:9px;
    font-size:16px;color:var(--accent);cursor:pointer;flex:0 0 auto;font-weight:800}
  .stp input{text-align:center}
  .timerBig{font-size:48px;font-weight:800;text-align:center;margin:12px 0;font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .timerBig.work{color:var(--accent)} .timerBig.rest{color:var(--accent2)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
  .calh{text-align:center;font-size:11px;color:var(--sub);padding:2px}
  .calc{position:relative;aspect-ratio:1;border:1px solid var(--line);background:#22262c;border-radius:9px;
    font-size:14px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:600}
  .calc.has{border-color:var(--accent);color:var(--accent);font-weight:800}
  .calc.tod{background:rgba(198,242,78,.14)}
  .calc .dot{position:absolute;bottom:5px;left:calc(50% - 5px);width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .calc .dot2{position:absolute;bottom:5px;left:calc(50% + 1px);width:6px;height:6px;border-radius:50%;background:var(--accent2)}
  .minibtn{border:1px solid var(--line);background:#22262c;border-radius:9px;padding:9px 13px;font-size:14px;cursor:pointer;color:var(--ink);font-weight:600}
  .settbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px}
  .settbl td{padding:5px 3px}
  .settbl tr.hd td{color:var(--sub);font-size:12px}
  .miniset{display:flex;align-items:center;gap:4px}
  .miniset button{width:32px;height:42px;border:1px solid var(--line);background:#22262c;border-radius:8px;color:var(--accent);font-weight:800;font-size:18px;cursor:pointer;flex:0 0 auto}
  .miniset input{width:54px;text-align:center;padding:9px 2px;font-size:16px;font-weight:700}
  .ck{width:46px;height:42px;border:1px solid var(--line);background:#22262c;border-radius:9px;color:#555b63;cursor:pointer;font-weight:800;font-size:16px}
  .ck.on{background:var(--accent);color:#16181c;border-color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>カラダ<span>管理</span></h1>
  <button class="gear" onclick="openSettings()" aria-label="設定"><svg class="gearic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg></button>
</header>
<div class="wrap" id="view"></div>

<div id="sessbar"></div>
<nav id="nav"></nav>

<!-- 設定シート -->
<div class="sheet" id="settingsSheet"></div>
<!-- 画像拡大 -->
<div class="overlay" id="imgOverlay" onclick="this.classList.remove('on')"><img id="imgBig"></div>

<script>
/* ============ データ層 ============ */
const KEY='karada_v1';
const DEFAULT={
  profile:{name:'', goal:'', model:'claude-haiku-4-5-20251001', apiKey:'', modelChat:'claude-sonnet-5', modelData:'claude-haiku-4-5-20251001'},
  templates:[], workouts:[], runs:[], meals:[],
  supList:[], supLogs:[], measures:[], conditions:[], schedule:[],
  plan:null, soreness:[], sessions:[],
  photoTags:['腹筋セパうっすら','腹筋セパくっきり','くびれ','肩の丸み','下腹の張り','太もも引き締まり','背中のライン'],
  aiChats:[]
};
let D=load();
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));if(!r)return JSON.parse(JSON.stringify(DEFAULT));
  const d=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),r);
  d.profile=Object.assign(JSON.parse(JSON.stringify(DEFAULT.profile)),r.profile||{});
  if(!Array.isArray(d.aiChats))d.aiChats=[];
  return d;}catch(e){return JSON.parse(JSON.stringify(DEFAULT));}}
function save(){localStorage.setItem(KEY,JSON.stringify(D));}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=s=>{const d=new Date(s+'T00:00');return (d.getMonth()+1)+'/'+d.getDate();};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============ 画像層 (IndexedDB) ============ */
let _db;
function db(){return new Promise((res,rej)=>{if(_db)return res(_db);
  const r=indexedDB.open('karada_imgs',1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('imgs',{keyPath:'id'});};
  r.onsuccess=e=>{_db=e.target.result;res(_db);};r.onerror=e=>rej(e);});}
async function imgPut(o){const d=await db();return new Promise((res,rej)=>{const t=d.transaction('imgs','readwrite');t.objectStore('imgs').put(o);t.oncomplete=()=>res();t.onerror=rej;});}
async function imgDel(id){const d=await db();return new Promise((res)=>{const t=d.transaction('imgs','readwrite');t.objectStore('imgs').delete(id);t.oncomplete=()=>res();});}
async function imgAll(){const d=await db();return new Promise((res)=>{const t=d.transaction('imgs','readonly');const rq=t.objectStore('imgs').getAll();rq.onsuccess=()=>res(rq.result||[]);});}
function fileToDataUrl(file,max=1000){return new Promise((res)=>{const img=new Image();const rd=new FileReader();
  rd.onload=()=>{img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    res(c.toDataURL('image/jpeg',.82));};img.src=rd.result;};rd.readAsDataURL(file);});}

/* ============ ルーティング ============ */
const TABS=[['今日','home'],['トレ','dumbbell'],['食事','meal'],['からだ','ruler'],['カレンダー','calendar'],['コーチ','coach']];
const ICONS={
  home:'<path d="M4 11.5 12 4l8 7.5"/><path d="M6.5 10.5V20h11v-9.5"/>',
  dumbbell:'<path d="M4 9v6M7 6.5v11M17 6.5v11M20 9v6M7 12h10"/>',
  meal:'<path d="M6 3v18M4 3v4.5a2 2 0 0 0 4 0V3"/><path d="M16 3v18"/><path d="M16 3c2 0 3 2.2 3 5.5S18 13 16 13"/>',
  ruler:'<rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7.5 8v3M11 8v4.5M14.5 8v3M18 8v4.5"/>',
  calendar:'<rect x="4" y="5" width="16" height="16" rx="2.5"/><path d="M4 9.5h16M9 3v4M15 3v4"/>',
  coach:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/>'
};
function navIcon(n){return `<svg class="nic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||''}</svg>`;}
let tab='今日', sub={};
function setTab(t){tab=t;render();window.scrollTo(0,0);}
function setSub(k,v){sub[k]=v;render();}
function render(){
  document.getElementById('nav').innerHTML=TABS.map(([t,i])=>
    `<button class="${t===tab?'on':''}" onclick="setTab('${t}')"><span class="ic">${navIcon(i)}</span>${t}</button>`).join('');
  const v=document.getElementById('view');
  v.innerHTML=({'今日':vToday,'トレ':vTre,'食事':vShoku,'からだ':vKarada,'カレンダー':vCalendar,'コーチ':vCoach}[tab])();
  if(tab==='からだ'&&sub.kbody==='写真')loadGallery();
  if(tab==='からだ'&&sub.kbody==='グラフ')drawChart();
  if(tab==='コーチ')setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),40);
  const sb=document.getElementById('sessbar');
  if(sb){const p=D.plan;const active=p&&p.startTs&&!p.endTs&&tab==='トレ'&&(sub.tre||'筋トレ')==='筋トレ';
    if(active){sb.className='on';sb.innerHTML=sessBar();document.body.classList.add('hasbar');}else{sb.className='';sb.innerHTML='';document.body.classList.remove('hasbar');}}
  startSessTick();
}

/* ============ 今日 ============ */
function vToday(){
  const t=today();
  const sc=D.schedule.filter(s=>s.date===t);
  const w=D.workouts.filter(x=>x.date===t).length;
  const m=D.meals.filter(x=>x.date===t);
  const sup=D.supLogs.filter(x=>x.date===t&&x.taken).length;
  const cond=D.conditions.find(x=>x.date===t);
  const greet=(D.profile.name?D.profile.name+' さん、':'')+'今日もおつかれさま';
  return `
  <h2>${esc(greet)}</h2>
  ${D.profile.goal?`<div class="card"><h3 style="margin-top:0">🎯 目標</h3>${esc(D.profile.goal)}</div>`:''}
  <div class="card">
    <h3 style="margin-top:0">📅 今日の予定</h3>
    ${sc.length?sc.map(s=>`<div class="item"><label style="display:flex;gap:8px;align-items:center;margin:0">
      <input type="checkbox" ${s.done?'checked':''} onchange="toggleSchedule('${s.id}')">
      <span style="${s.done?'text-decoration:line-through;color:var(--sub)':''}">
      <span class="pill ${s.type==='運動'?'':'ok'}">${s.type}</span> ${esc(s.title)} ${s.time?`<span class="muted">${esc(s.time)}</span>`:''}</span>
      </label><button class="del" onclick="delItem('schedule','${s.id}')">削除</button></div>`).join('')
      :'<div class="muted">まだ予定なし</div>'}
    <div class="flex3" style="margin-top:10px">
      <select id="scType"><option>運動</option><option>食事</option></select>
      <input id="scTitle" placeholder="内容（例：脚トレ）">
      <input id="scTime" placeholder="時間 任意" style="max-width:90px">
    </div>
    <button class="btn sm ghost" style="margin-top:8px;width:100%" onclick="addSchedule()">＋予定を追加</button>
  </div>
  <div class="kpi">
    <div><b>${w}</b><span>トレ</span></div>
    <div><b>${m.length}</b><span>食事記録</span></div>
    <div><b>${sup}</b><span>サプリ✓</span></div>
    <div><b>${cond?(cond.period?'🩸':'—'):'—'}</b><span>周期</span></div>
  </div>
  <h3>クイック記録</h3>
  <div class="row">
    <button class="chip" onclick="setTab('トレ')">🏋️ トレを記録</button>
    <button class="chip" onclick="setSub('tre','ラン')||setTab('トレ')">🏃 ラン</button>
    <button class="chip" onclick="setTab('食事')">🍽️ 食事</button>
    <button class="chip" onclick="setSub('shoku','サプリ')||setTab('食事')">💊 サプリ</button>
    <button class="chip" onclick="setSub('kbody','採寸')||setTab('からだ')">📏 採寸</button>
    <button class="chip" onclick="setSub('kbody','体調・周期')||setTab('からだ')">🌙 体調</button>
  </div>`;
}
function addSchedule(){const title=document.getElementById('scTitle').value.trim();if(!title)return;
  D.schedule.push({id:uid(),date:today(),type:document.getElementById('scType').value,title,time:document.getElementById('scTime').value.trim(),done:false});save();render();}
function toggleSchedule(id){const s=D.schedule.find(x=>x.id===id);if(s){s.done=!s.done;save();render();}}

/* ============ トレ（筋トレ / ラン）============ */
function vTre(){
  const s=sub.tre||'筋トレ';
  return `<div class="subtabs">
    ${['筋トレ','ラン'].map(x=>`<button class="${x===s?'on':''}" onclick="setSub('tre','${x}')">${x}</button>`).join('')}
    </div>${s==='筋トレ'?vKin()+timerBlock():vRun()+timerBlock()}`;
}
function timerBlock(){return `<details style="margin-top:6px"><summary style="cursor:pointer;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);font-weight:700;list-style:none">⏱ タイマー（ストップウォッチ・インターバル）</summary>${vTimer()}</details>`;}
function vKin(){
  const t=today();
  ensurePlan();
  window._itemTimes=computeItemTimes();
  const items=D.plan.items;
  const totalVol=items.reduce((a,x)=>a+itemVol(x),0);
  const pastDates=[...new Set(D.workouts.map(w=>w.date))].sort().reverse();
  const recentEx=[...new Set(D.workouts.slice().reverse().map(w=>w.name))].slice(0,8);
  const running=D.plan.startTs&&!D.plan.endTs;
  return `
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <b>全体のボリューム</b><b style="font-size:18px">${totalVol}kg</b></div>
    <div style="margin-top:8px">${sessCtrl()}</div>
    ${running?`<label style="display:flex;gap:8px;align-items:center;margin-top:10px;font-size:13px">
      <input type="checkbox" ${D.plan.restOn?'checked':''} onchange="toggleRest()"> 休憩タイマー：セット完了で
      <input type="number" style="width:52px;padding:4px" value="${D.plan.restSec||60}" onchange="D.plan.restSec=+this.value||60;save()">秒カウント
      <span class="restDisp" style="margin-left:auto;font-weight:700;color:var(--accent2)"></span></label>`:''}
    ${items.some(it=>(it.noWeight?it.done:((it.sets||[]).length&&it.sets.every(s=>s.done)))&&!it.collapsed)?`<button class="btn gray sm" style="width:100%;margin-top:8px" onclick="collapseCompleted()">▾ 完了した種目をまとめて畳む</button>`:''}
  </div>

function exCard(x,i){

  if(x.collapsed){

  </div>`;
  }
  return `<div class="card">${head}${nwToggle}
    ${prev?`<div style="background:#22262c;border:1px solid var(--line);border-radius:9px;padding:10px;margin-top:8px;font-size:12px;color:var(--sub)">前回 ${fmtD(prev.date)}：${prev.sets.map(fmtSet).join(' , ')||'—'}${prev.memo?'<br>📝 '+esc(prev.memo):''}
      <button class="btn sm ghost" style="margin-top:8px;width:100%" onclick="copyPrevTo('${x.id}')">⭱ 前回の記録をコピー</button></div>`:'<div class="muted" style="font-size:12px;margin-top:6px">はじめての種目</div>'}
    <div class="muted" style="margin-top:8px">総ボリューム ${itemVol(x)}kg</div>
    <table class="settbl"><tr class="hd"><td>ｾｯﾄ</td><td>kg</td><td>回</td><td style="text-align:center">完了</td></tr>
      ${(x.sets||[]).map((s,j)=>`<tr>

        <td style="text-align:center"><button class="ck ${s.done?'on':''}" onclick="setDone('${x.id}',${j})">✓</button></td></tr>`).join('')}
    </table>
    <div class="row" style="margin-top:6px"><button class="minibtn" onclick="setDel('${x.id}')">− セット削除</button><button class="minibtn" style="color:var(--accent)" onclick="setAdd('${x.id}')">＋ セット追加</button></div>
    <input placeholder="メモ（フォーム・意識・効いた部位）" value="${esc(x.memo||'')}" onchange="itemMemo('${x.id}',this.value)" style="margin-top:8px">

/* ---- プラン（種目カード）データ ---- */
function ensurePlan(){if(!D.plan||D.plan.date!==today())D.plan={date:today(),items:[],startTs:null,endTs:null,restOn:false,restSec:60,paused:false,accum:0,segStart:null};
  if(D.plan.restSec==null)D.plan.restSec=60;if(D.plan.restOn==null)D.plan.restOn=false;
  if(D.plan.paused==null)D.plan.paused=false;if(D.plan.accum==null)D.plan.accum=0;if(D.plan.segStart==null)D.plan.segStart=D.plan.startTs||null;
  D.plan.items.forEach(it=>{if(!Array.isArray(it.sets))it.sets=[{kg:'',reps:'',done:false}];if(it.memo==null)it.memo='';if(it.part==null)it.part='';if(it.noWeight==null)it.noWeight=false;if(it.collapsed==null)it.collapsed=false;});}
function newItem(n){return {id:uid(),name:n,part:'',memo:'',noWeight:false,done:false,doneTs:null,collapsed:false,sets:[{kg:'',reps:'',done:false}]};}
function toggleCollapse(id){const x=planItem(id);if(!x)return;x.collapsed=!x.collapsed;save();render();}
function collapseCompleted(){ensurePlan();let n=0;D.plan.items.forEach(it=>{const done=it.noWeight?it.done:((it.sets||[]).length&&it.sets.every(s=>s.done));if(done&&!it.collapsed){it.collapsed=true;n++;}});save();render();}
function renameItem(id){const x=planItem(id);if(!x)return;const n=prompt('種目名',x.name);if(n&&n.trim()){x.name=n.trim();save();render();}}
function toggleNoWeight(id){const x=planItem(id);if(!x)return;x.noWeight=!x.noWeight;save();render();}
function itemDone(id){const x=planItem(id);if(!x)return;x.done=!x.done;x.doneTs=x.done?Date.now():null;if(x.done){if(!D.plan.startTs)sessStart();x.collapsed=true;}save();render();}
function addPlanNoWeight(n){ensurePlan();const it=newItem(n);it.noWeight=true;D.plan.items.push(it);save();render();}
function itemVol(x){return Math.round((x.sets||[]).reduce((a,s)=>a+((+s.kg||0)*(+s.reps||0)),0));}
function planItem(id){ensurePlan();return D.plan.items.find(x=>x.id===id);}
function addPlan(){const n=(document.getElementById('planEx').value||'').trim();if(!n)return;ensurePlan();D.plan.items.push(newItem(n));save();render();}
function addPlanName(n){ensurePlan();D.plan.items.push(newItem(n));save();render();}
function planMove(i,d){ensurePlan();const a=D.plan.items;const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render();}
function planRemove(id){ensurePlan();D.plan.items=D.plan.items.filter(x=>x.id!==id);save();render();}
function loadPlanFromSelect(){const d=document.getElementById('planLoad').value;if(d)loadPlanFromDateStr(d);}
function loadPlanFromDateStr(ds){ensurePlan();const seen=[],items=[];
  D.workouts.filter(w=>w.date===ds).forEach(w=>{if(!seen.includes(w.name)){seen.push(w.name);items.push(newItem(w.name));}});
  if(!items.length)return;D.plan.items=items;save();setSub('tre','筋トレ');}
/* ---- セット編集 ---- */
function setField(id,j,f,v){const x=planItem(id);if(x&&x.sets[j]){x.sets[j][f]=(v===''?'':(+v));save();render();}}
function setStep(id,j,f,d){const x=planItem(id);if(!x||!x.sets[j])return;const cur=+x.sets[j][f]||0;x.sets[j][f]=Math.max(0,Math.round((cur+d)*10)/10);save();render();}
function setDone(id,j){const x=planItem(id);if(!x||!x.sets[j])return;const s=x.sets[j];s.done=!s.done;s.doneTs=s.done?Date.now():null;
  if(s.done){if(!D.plan.startTs)sessStart();if(D.plan.restOn)startRest(D.plan.restSec||60);
    if(x.sets.length&&x.sets.every(t=>t.done))x.collapsed=true;}save();render();}
function setAdd(id){const x=planItem(id);if(!x)return;const last=x.sets[x.sets.length-1]||{kg:'',reps:''};x.sets.push({kg:last.kg,reps:last.reps,done:false});save();render();}
function setDel(id){const x=planItem(id);if(!x||!x.sets.length)return;x.sets.pop();save();render();}
function itemMemo(id,v){const x=planItem(id);if(x){x.memo=v;save();}}
function copyPrevTo(id){const x=planItem(id);if(!x)return;const prev=[...D.workouts].reverse().find(w=>w.name===x.name&&w.date!==today());if(!prev)return;
  x.sets=(prev.sets.length?prev.sets:[{}]).map(s=>({kg:s.weight==null?'':s.weight,reps:s.reps==null?'':s.reps,done:false}));save();render();}
/* ---- トレ実行/時間計測 ---- */
function fmtMin(sec){sec=Math.round(sec||0);if(sec<60)return sec+'秒';const m=Math.floor(sec/60);if(m<60)return m+'分';return Math.floor(m/60)+'時間'+(m%60)+'分';}
function computeItemTimes(){const p=D.plan;const map={};if(!p||!p.startTs)return map;
  const arr=p.items.map(it=>{let ts=null;
    if(it.noWeight){if(it.done&&it.doneTs)ts=it.doneTs;}
    else{const a=(it.sets||[]).filter(s=>s.done&&s.doneTs).map(s=>s.doneTs);if(a.length)ts=Math.max(...a);}
    return ts?{id:it.id,ts}:null;}).filter(Boolean).sort((a,b)=>a.ts-b.ts);
  let prev=p.startTs;arr.forEach(o=>{map[o.id]=Math.max(0,(o.ts-prev)/1000);prev=o.ts;});return map;}
function elapsedSec(){const p=D.plan;if(!p||!p.startTs)return 0;
  const run=!p.endTs&&!p.paused&&p.segStart;return (p.accum||0)+(run?(Date.now()-p.segStart)/1000:0);}
function sessCtrl(){const p=D.plan;
  if(!p.startTs)return `<button class="btn" onclick="sessStart()">▶ トレーニング開始（時間を計測）</button>`;
  if(p.startTs&&!p.endTs){
    const pauseBtn=p.paused
      ?`<button class="btn sm" style="width:auto" onclick="sessResume()">▶ 再開</button>`
      :`<button class="btn gray sm" style="width:auto" onclick="sessPause()">⏸ 一時停止</button>`;
    return `<div class="row" style="justify-content:space-between;align-items:center;gap:8px">
    <span>⏱ 運動時間 <b class="sessElapsed" style="font-variant-numeric:tabular-nums;font-size:18px">${fmtT(Math.floor(elapsedSec()))}</b>${p.paused?' <span style="color:var(--sub);font-size:12px">（停止中）</span>':''}</span>
    <span style="display:flex;gap:8px">${pauseBtn}<button class="btn warn sm" style="width:auto" onclick="sessEnd()">■ 完了</button></span></div>`;}
  return `<div class="row" style="justify-content:space-between;align-items:center">
    <span>✅ 今日の合計 <b>${fmtMin(p.accum||0)}</b></span>
    <button class="btn gray sm" style="width:auto" onclick="sessReset()">やり直す</button></div>`;}
function sessBar(){const p=D.plan;const pauseBtn=p.paused
    ?`<button class="btn sm" style="width:auto;padding:8px 14px" onclick="sessResume()">▶ 再開</button>`
    :`<button class="btn gray sm" style="width:auto;padding:8px 12px" onclick="sessPause()">⏸</button>`;
  const skipBtn=p.restOn?`<button class="btn gray sm" style="width:auto;padding:8px 10px" onclick="skipRest()">⏭休憩</button>`:'';
  return `<span style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;color:var(--sub)">運動</span><b class="sessElapsed" style="font-variant-numeric:tabular-nums;font-size:18px">${fmtT(Math.floor(elapsedSec()))}</b></span>
    <span class="restDisp" style="color:var(--accent2);font-weight:700;font-size:14px"></span>
    <span style="margin-left:auto;display:flex;gap:6px">${skipBtn}${pauseBtn}<button class="btn warn sm" style="width:auto;padding:8px 12px" onclick="sessEnd()">■完了</button></span>`;}
function sessStart(){ensurePlan();const n=Date.now();D.plan.startTs=n;D.plan.segStart=n;D.plan.accum=0;D.plan.paused=false;D.plan.endTs=null;save();render();}
function sessPause(){ensurePlan();const p=D.plan;if(p.startTs&&!p.endTs&&!p.paused){p.accum=(p.accum||0)+(Date.now()-p.segStart)/1000;p.paused=true;p.segStart=null;}save();render();}
function sessResume(){ensurePlan();const p=D.plan;if(p.paused){p.paused=false;p.segStart=Date.now();}save();render();}
function sessEnd(){ensurePlan();if(!D.plan.startTs)return;const p=D.plan;
  if(!p.paused&&p.segStart)p.accum=(p.accum||0)+(Date.now()-p.segStart)/1000;
  p.paused=false;p.segStart=null;D.plan.endTs=Date.now();
  const t=computeItemTimes();
  D.plan.items.forEach(it=>{
    if(it.noWeight){if(it.done||it.memo)D.workouts.push({id:uid(),date:today(),name:it.name,sets:[],memo:it.memo||'',noWeight:true});return;}
    const sets=(it.sets||[]).filter(s=>(s.kg!==''&&s.kg!=null)||(s.reps!==''&&s.reps!=null))
    .map(s=>({weight:(s.kg===''||s.kg==null)?null:+s.kg,reps:(s.reps===''||s.reps==null)?null:+s.reps}));
    if(sets.length)D.workouts.push({id:uid(),date:today(),name:it.name,sets,memo:it.memo||''});});
  D.sessions.push({id:uid(),date:today(),startTs:D.plan.startTs,endTs:D.plan.endTs,
    totalSec:Math.round(D.plan.accum||0),
    items:D.plan.items.filter(it=>it.noWeight?it.done:(it.sets||[]).some(s=>s.done)).map(it=>({name:it.name,sec:Math.round(t[it.id]||0)}))});
  clearInterval(window._restInt);save();render();}
function sessReset(){ensurePlan();D.plan.startTs=null;D.plan.endTs=null;D.plan.paused=false;D.plan.accum=0;D.plan.segStart=null;D.plan.items.forEach(it=>{it.done=false;it.doneTs=null;it.collapsed=false;(it.sets||[]).forEach(s=>{s.done=false;s.doneTs=null;});});clearInterval(window._restInt);save();render();}
function toggleRest(){ensurePlan();D.plan.restOn=!D.plan.restOn;save();render();}
function setRestText(t){document.querySelectorAll('.restDisp').forEach(el=>el.textContent=t);}
function skipRest(){clearInterval(window._restInt);window._restLeft=0;setRestText('');}
function startRest(sec){clearInterval(window._restInt);window._restLeft=sec;
  setRestText('休憩 '+window._restLeft+'秒');
  window._restInt=setInterval(()=>{window._restLeft--;
    if(window._restLeft<=0){clearInterval(window._restInt);setRestText('休憩おわり💪');beep(660);}
    else setRestText('休憩 '+window._restLeft+'秒');},1000);}
function startSessTick(){clearInterval(window._sessInt);window._sessInt=setInterval(()=>{
  const els=document.querySelectorAll('.sessElapsed');const p=D.plan;
  if(els.length&&p&&p.startTs&&!p.endTs&&!p.paused){const t=fmtT(Math.floor(elapsedSec()));els.forEach(el=>el.textContent=t);}
  else if(!p||!p.startTs||p.endTs)clearInterval(window._sessInt);},1000);}

function calPick(ds){const box=document.getElementById('calDay');if(!box)return;

    <h3>🏋️ 運動 ${ws.length?`<button class="btn sm ghost" style="width:auto;float:right" onclick="loadPlanFromDateStr('${ds}')">今日のメニューに読込</button>`:''}</h3>

async function loadCalThumbs(box){const ims=box.querySelectorAll('img.cthumb');if(!ims.length)return;

function fmtSet(s){if(s.dur)return s.dur;if(s.weight==null&&s.reps!=null)return s.reps+'回';return `${s.weight!=null?s.weight:'-'}kg×${s.reps!=null?s.reps:'-'}`;}
function wItem(w){return `<div class="card" style="padding:11px 14px"><div class="row" style="justify-content:space-between">

  ${w.memo?`<div style="font-size:13px;margin-top:3px">📝 ${esc(w.memo)}</div>`:''}</div>`;}
function parseBurnfit(text){
  const dm=text.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
  const date=dm?`${dm[1]}-${String(dm[2]).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`:today();
  const setRe=/^\d+\s*セット\s*[:：]/;
  const items=[]; let cur=null;
  text.split(/\n/).map(l=>l.trim()).filter(Boolean).forEach(line=>{
    if(/^#/.test(line)||/^https?:\/\//.test(line)||/トレーニング記録/.test(line))return;
    if(setRe.test(line)){
      if(!cur)return;
      const body=line.replace(setRe,'').trim();
      const kg=body.match(/([\d.]+)\s*kg/), rep=body.match(/([\d.]+)\s*回/), min=body.match(/([\d.]+)\s*分/);
      const s={};
      if(kg)s.weight=+kg[1];
      if(rep)s.reps=+rep[1];
      if(min&&!kg&&!rep)s.dur=min[1]+'分';
      if(Object.keys(s).length)cur.sets.push(s);
    }else{
      cur={id:uid(),date,name:line,sets:[],memo:''}; items.push(cur);
    }
  });
  return {date, items:items.filter(i=>i.sets.length)};
}
function importBurnfit(){
  const t=document.getElementById('bfText').value.trim();
  if(!t){alert('BurnFitの記録テキストを貼ってね');return;}
  const {date,items}=parseBurnfit(t);
  if(!items.length){alert('種目・セットが読み取れませんでした。書式を確認してね');return;}
  const summary=items.map(i=>`・${i.name}（${i.sets.length}セット）`).join('\n');
  if(!confirm(`${date} の記録として次を追加します：\n\n${summary}\n\nよろしい？`))return;
  items.forEach(i=>D.workouts.push(i));
  save();render();
}

let _sw={t:0,run:false,iv:null};
function fmtT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function swTick(){_sw.t++;const d=document.getElementById('swDisp');if(d)d.textContent=fmtT(_sw.t);}
function swToggle(){const b=document.getElementById('swBtn');
  if(_sw.run){clearInterval(_sw.iv);_sw.run=false;b.textContent='再開';}
  else{_sw.iv=setInterval(swTick,1000);_sw.run=true;b.textContent='一時停止';}}
function swReset(){clearInterval(_sw.iv);_sw={t:0,run:false,iv:null};const d=document.getElementById('swDisp');if(d)d.textContent='00:00';const b=document.getElementById('swBtn');if(b)b.textContent='スタート';}
let _iv={run:false,timer:null,phase:'',left:0,round:0,work:40,rest:20,rounds:8};
function beep(f){try{const c=new (window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.frequency.value=f||880;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.25,c.currentTime);o.start();o.stop(c.currentTime+0.18);}catch(e){}if(navigator.vibrate)navigator.vibrate(160);}
function ivRender(){const d=document.getElementById('ivDisp'),p=document.getElementById('ivPhase');
  if(d){d.textContent=_iv.left;d.className='timerBig '+_iv.phase;}
  if(p)p.textContent=(_iv.phase==='work'?'運動':'休憩')+`  ${_iv.round+1}/${_iv.rounds}`;}
function ivStep(){_iv.left--;
  if(_iv.left<=0){
    if(_iv.phase==='work'){_iv.round++;if(_iv.round>=_iv.rounds){ivDone();return;}_iv.phase='rest';_iv.left=_iv.rest;beep(440);}
    else{_iv.phase='work';_iv.left=_iv.work;beep(880);}
  }
  ivRender();}
function ivToggle(){const b=document.getElementById('ivBtn');
  if(_iv.run){clearInterval(_iv.timer);_iv.run=false;b.textContent='再開';return;}
  if(_iv.phase===''){_iv.work=+document.getElementById('ivWork').value||40;_iv.rest=+document.getElementById('ivRest').value||20;_iv.rounds=+document.getElementById('ivRounds').value||8;_iv.round=0;_iv.phase='work';_iv.left=_iv.work;beep(880);}
  _iv.timer=setInterval(ivStep,1000);_iv.run=true;b.textContent='一時停止';ivRender();}
function ivReset(){clearInterval(_iv.timer);_iv={run:false,timer:null,phase:'',left:0,round:0,work:40,rest:20,rounds:8};
  const d=document.getElementById('ivDisp');if(d){d.textContent='--';d.className='timerBig';}
  const p=document.getElementById('ivPhase');if(p)p.textContent='';const b=document.getElementById('ivBtn');if(b)b.textContent='スタート';}
function ivDone(){clearInterval(_iv.timer);_iv.run=false;_iv.phase='';
  const d=document.getElementById('ivDisp');if(d){d.textContent='完了';d.className='timerBig';}
  const p=document.getElementById('ivPhase');if(p)p.textContent='おつかれさま！';const b=document.getElementById('ivBtn');if(b)b.textContent='スタート';beep(660);}

function vChart(){
  return `<div class="card"><h3 style="margin-top:0">推移グラフ</h3>
    <select id="chartPick" onchange="drawChart()">${MFIELDS.map(([k,l])=>`<option value="${k}">${l}</option>`).join('')}</select>
    <div id="chartBox" style="margin-top:12px"></div></div>`;
}
function drawChart(){const box=document.getElementById('chartBox');if(!box)return;
  const k=document.getElementById('chartPick').value;
  const pts=D.measures.filter(m=>m[k]!=null).map(m=>({x:m.date,y:m[k]}));
  if(pts.length<2){box.innerHTML='<div class="muted">データが2件以上たまるとグラフが出ます</div>';return;}
  const W=460,H=180,pad=30;const ys=pts.map(p=>p.y);const mn=Math.min(...ys),mx=Math.max(...ys);const rng=(mx-mn)||1;
  const X=i=>pad+i*(W-2*pad)/(pts.length-1);const Y=v=>H-pad-((v-mn)/rng)*(H-2*pad);
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.y).toFixed(1)}`).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="3" fill="#2f9e83"/>`).join('');
  const labs=pts.map((p,i)=>(i%Math.ceil(pts.length/5)===0||i===pts.length-1)?`<text x="${X(i)}" y="${H-8}" font-size="10" fill="#8a8a8a" text-anchor="middle">${fmtD(p.x)}</text>`:'').join('');
  box.innerHTML=`<svg viewBox="0 0 ${W} ${H}">
    <text x="4" y="14" font-size="11" fill="#8a8a8a">${mx}</text><text x="4" y="${H-pad}" font-size="11" fill="#8a8a8a">${mn}</text>
    <path d="${line}" fill="none" stroke="#2f9e83" stroke-width="2"/>${dots}${labs}</svg>
    <div class="muted">最新 ${pts[pts.length-1].y}（${pts.length}件）</div>`;
}

/* ============ AIコーチ ============ */
function aiKey(){return (D.profile.apiKey||'').trim();}
function aiModelChat(){return D.profile.modelChat||'claude-sonnet-5';}
function aiModelData(){return D.profile.modelData||'claude-haiku-4-5-20251001';}
async function aiCall(messages,opts){opts=opts||{};
  const key=aiKey();if(!key)throw new Error('APIキーが未設定です（設定→AIコーチ）');
  const body={model:opts.model||aiModelChat(),max_tokens:opts.max_tokens||1024,messages};
  if(opts.system)body.system=opts.system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)});
  if(!res.ok){let t='';try{t=await res.text();}catch(e){}let msg=String(res.status);
    try{const j=JSON.parse(t);if(j.error&&j.error.message)msg=res.status+' '+j.error.message;}catch(e){if(t)msg=res.status+' '+t.slice(0,200);}
    throw new Error('APIエラー: '+msg);}
  const j=await res.json();
  return (j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();}
function aiContext(){const L=[];
  const rw=D.workouts.slice(-12);if(rw.length)L.push('◾最近のトレ: '+rw.map(w=>`${w.date} ${w.name}[${(w.sets||[]).map(fmtSet).join(',')||w.memo||'-'}]`).join(' / '));
  const rm=D.meals.slice(-10);if(rm.length)L.push('◾最近の食事: '+rm.map(m=>`${m.date}${m.type}:${m.memo}(${m.level})`).join(' / '));
  const lm=D.measures.slice(-1)[0];if(lm)L.push('◾最新の採寸/体重: '+MFIELDS.filter(([k])=>lm[k]!=null).map(([k,l])=>l+lm[k]).join(' '));
  const rc=D.conditions.slice(-5);if(rc.length)L.push('◾最近の体調/生理: '+rc.map(c=>`${c.date}${c.period?'🩸':''}${c.mood||''}${c.memo?'('+c.memo+')':''}`).join(' / '));
  const rs=(D.soreness||[]).slice(-5);if(rs.length)L.push('◾最近の筋肉痛: '+rs.map(s=>`${s.date}${(s.parts||[]).join('・')}${s.level||''}`).join(' / '));
  const sp=D.supList.map(s=>s.name).join('・');if(sp)L.push('◾常用サプリ: '+sp);
  return L.length?L.join('\n'):'（まだ記録が少ないです）';}
function aiSystem(){const p=D.profile;
  return `あなたは${p.name||'ユーザー'}さん専属のフィットネス＆解剖学コーチです。相手は整形外科志望の医療従事者で、解剖学的に正確で具体的な説明を好みます。以下の記録を踏まえ、目標に沿って実行可能で簡潔にアドバイスしてください。断定しすぎず、必要なら安全面の注意も添える。日本語で要点を絞って回答。
【目標(理想の体型)】${p.goal||'（未設定）'}
${aiContext()}`;}
async function sendCoach(){const inp=document.getElementById('coachInput');const q=(inp?inp.value:'').trim();if(!q)return;
  if(!aiKey()){alert('先に設定でAPIキーを入れてね');return;}
  D.aiChats.push({role:'user',content:q});save();window._coachBusy=true;render();
  try{let msgs=D.aiChats.filter(m=>m.role==='user'||m.role==='assistant').slice(-12).map(m=>({role:m.role,content:m.content}));
    while(msgs.length&&msgs[0].role!=='user')msgs.shift();
    const ans=await aiCall(msgs,{system:aiSystem(),model:aiModelChat(),max_tokens:1200});
    D.aiChats.push({role:'assistant',content:ans});}
  catch(e){D.aiChats.push({role:'assistant',content:'⚠️ '+e.message});}
  window._coachBusy=false;save();render();}
function clearCoach(){if(confirm('会話履歴を消す？')){D.aiChats=[];save();render();}}
function coachSetup(){return `<div class="card"><h3 style="margin-top:0">🐉 AIコーチを開眼させる</h3>

   <li>API Keysでキーを発行</li>

  <button class="btn" style="margin-top:8px" onclick="openSettings()">⚙ 設定を開く</button></div>`;}
function vCoach(){
  if(!aiKey())return `<div class="subtabs"><button class="on">🐉 コーチ</button></div>`+coachSetup();

    ||'<div class="muted" style="text-align:center;padding:24px 8px">目標に沿って何でも聞いてね。<br><br>例：「今のメニュー、理想に近づくには何を足す？」<br>「今日は脚に筋肉痛、何やるべき？」<br>「停滞してるので次の一手を」</div>';
  return `<div class="subtabs"><button class="on">🐉 コーチ</button></div>
   <div id="coachMsgs" style="display:flex;flex-direction:column;gap:8px;padding:6px 0 12px">${msgs}${window._coachBusy?'<div class="cbub assistant" style="opacity:.7">🐉 考え中…</div>':''}</div>
   <div class="card">
     <textarea id="coachInput" placeholder="相談を入力…" style="min-height:54px"></textarea>
     <div class="row" style="justify-content:space-between;margin-top:6px">
       <button class="minibtn" onclick="clearCoach()">履歴クリア</button>
       <button class="btn sm" style="width:auto" onclick="sendCoach()">送信（${aiModelChat().includes('sonnet')?'Sonnet':'Haiku'}）</button>
     </div>
   </div>`;}
function modelOpts(sel){const M=[['claude-sonnet-5','Sonnet（賢い・相談向き）'],['claude-haiku-4-5-20251001','Haiku（安い・整理向き）']];
  return M.map(([v,l])=>`<option value="${v}"${v===sel?' selected':''}>${l}</option>`).join('');}
function saveAI(){D.profile.apiKey=(document.getElementById('pfKey').value||'').trim();
  D.profile.modelChat=document.getElementById('pfModelChat').value;

async function aiTest(){const btn=document.getElementById('aiTestBtn');const old=btn?btn.textContent:'';if(btn)btn.textContent='テスト中…';
  D.profile.apiKey=(document.getElementById('pfKey').value||'').trim();save();
  try{const r=await aiCall([{role:'user',content:'接続テストです。「OK」とだけ返してください。'}],{model:aiModelData(),max_tokens:20});
    alert('接続成功 ✅\n応答: '+r);}catch(e){alert('接続失敗 ❌\n'+e.message);}
  if(btn)btn.textContent=old||'接続テスト';}
/* ============ 起動 ============ */
window._mood='';window._pkind='progress';window._soreParts=[];window._soreLv='';
render();
</script>
